<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · os-bakery</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <style>
    body { font-feature-settings: "ss01", "cv11"; }
    .grid-pattern {
      background-image:
        linear-gradient(to right, rgb(0 0 0 / 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgb(0 0 0 / 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* tighten up the prose styles to match the rest of the site */
    article.prose :where(h1,h2,h3) { letter-spacing: -0.01em; }
    article.prose :where(code):not(:where(pre code)) {
      background: rgb(245 245 244);
      padding: 0.15rem 0.35rem;
      border-radius: 0.25rem;
      font-weight: 500;
    }
    article.prose pre {
      background: rgb(28 25 23);
      color: rgb(245 245 244);
      border-radius: 0.75rem;
      font-size: 0.85rem;
    }
    article.prose pre code { background: transparent; padding: 0; }
    article.prose table { font-size: 0.9rem; }
    article.prose blockquote {
      border-left-color: #f59e0b;
      background: rgb(255 251 235);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-style: normal;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen grid-pattern">

  <div class="max-w-5xl mx-auto px-6 md:px-10">

    <header class="pt-10 pb-6">
      <a href="/" class="font-mono text-xs uppercase tracking-widest text-stone-500 hover:text-stone-900">
        ← os-bakery
      </a>
      <h1 class="mt-3 text-3xl md:text-4xl font-bold tracking-tight">{{ title }}</h1>
      <p class="mt-2 text-stone-600 max-w-3xl">{{ tagline }}</p>
    </header>

    <nav class="mb-8 flex flex-wrap gap-2 text-sm">
      <a href="/docs/" class="px-3 py-1.5 rounded-md border border-stone-200 hover:bg-stone-100">
        ← all docs
      </a>
      {% for p in other_pages %}
      <a href="/docs/{{ p.slug }}/"
         class="px-3 py-1.5 rounded-md border border-stone-200 hover:bg-stone-100 text-stone-600">
        {{ p.title }}
      </a>
      {% endfor %}
    </nav>

    <article class="prose prose-stone max-w-none bg-white rounded-2xl border border-stone-200 p-8 md:p-12 mb-16"
             style="border-top: 3px solid #f59e0b">
      {{ body_html|safe }}
    </article>

    <footer class="border-t border-stone-200 py-8 text-xs text-stone-500 flex justify-between font-mono">
      <span><a href="/" class="hover:text-stone-900">← home</a></span>
      <span><a href="/docs/" class="hover:text-stone-900">all docs →</a></span>
    </footer>
  </div>
</body>
</html>
